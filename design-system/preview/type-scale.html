<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:24px 36px;box-sizing:border-box;display:flex;align-items:center}
  .stack{display:flex;flex-direction:column;gap:14px;width:100%}
  .row{display:flex;align-items:baseline;gap:18px}
  .tag{font-family:var(--font-sans);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-3);width:84px;flex-shrink:0}
  .specimen{color:var(--fg-2);font-family:var(--font-serif);font-weight:500;line-height:1.15;letter-spacing:0.04em}
  .specimen.body{color:var(--fg-1);font-weight:400;line-height:1.9;letter-spacing:0.03em}
</style></head><body>
<div class="stack">
  <div class="row"><div class="tag">display</div><div class="specimen" style="font-size:38px">都市の余白を読む</div></div>
  <div class="row"><div class="tag">h1</div><div class="specimen" style="font-size:28px">日本橋、川を取り戻す</div></div>
  <div class="row"><div class="tag">h2</div><div class="specimen" style="font-size:20px">建築としての地下空間</div></div>
  <div class="row"><div class="tag">h3</div><div class="specimen" style="font-size:16px">虎ノ門ヒルズの新しい層</div></div>
  <div class="row"><div class="tag">body</div><div class="specimen body" style="font-size:14px">少し赤みのある紙の上に、静かに組まれた都市の記録。</div></div>
</div>
</body></html>
