<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;display:flex;align-items:center;padding:28px 36px;box-sizing:border-box}
  .card{width:100%}
  .row{display:flex;align-items:baseline;gap:24px;flex-wrap:wrap}
  .label{font-family:var(--font-sans);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-3)}
  .swatch{width:56px;height:56px;border:1px solid var(--color-border)}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--fg-3);letter-spacing:0.04em}
</style></head><body>
<div class="card">
<div class="row" style="gap:32px">
  <div>
    <div class="swatch" style="background:#1f1f1f;border-color:#1f1f1f"></div>
    <div class="label" style="margin-top:10px">text</div>
    <div class="meta">#1f1f1f</div>
  </div>
  <div>
    <div class="swatch" style="background:#3a3937;border-color:#3a3937"></div>
    <div class="label" style="margin-top:10px">accent</div>
    <div class="meta">#3a3937</div>
  </div>
  <div>
    <div class="swatch" style="background:#7a736b;border-color:#7a736b"></div>
    <div class="label" style="margin-top:10px">muted</div>
    <div class="meta">#7a736b</div>
  </div>
  <div style="flex:1;min-width:200px;align-self:center">
    <div style="font-family:var(--font-serif);color:var(--fg-1);line-height:1.85;font-size:15px">
      <span style="color:#1f1f1f">本文インクは少し柔らかい黒。</span>
      <span style="color:#3a3937">見出しは更に淡く。</span>
      <span style="color:#7a736b">補助は静かに。</span>
    </div>
    <div class="meta" style="margin-top:8px">No pure black — softened ink at three depths.</div>
  </div>
</div>
</div>
</body></html>
