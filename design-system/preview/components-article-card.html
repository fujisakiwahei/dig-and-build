<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:24px 36px;box-sizing:border-box;display:flex;align-items:center;gap:28px}
  .card{flex:1;max-width:300px}
  .thumb{aspect-ratio:4/3;background:linear-gradient(135deg,#c9b8a3,#8a7868);border:1px solid var(--color-border)}
  .meta{display:flex;gap:12px;margin-top:14px;font-family:var(--font-sans);font-size:10px;letter-spacing:0.12em;color:var(--fg-3);text-transform:uppercase}
  .title{margin-top:8px;font-family:var(--font-serif);font-size:17px;line-height:1.5;color:var(--fg-2);letter-spacing:0.04em;font-weight:500}
  .excerpt{margin-top:6px;font-family:var(--font-serif);font-size:12.5px;line-height:1.8;color:var(--fg-1);letter-spacing:0.03em}
</style></head><body>
<article class="card">
  <div class="thumb"></div>
  <div class="meta"><span>2026.04.21</span><span>·</span><span>再開発</span><span>·</span><span>日本橋</span></div>
  <div class="title">日本橋、川を取り戻す</div>
  <div class="excerpt">高速道路の地下化が進む日本橋で、川面の景観が再び姿を現しはじめている。</div>
</article>
<article class="card">
  <div class="thumb" style="background:linear-gradient(135deg,#a89684,#5e4f3f)"></div>
  <div class="meta"><span>2026.04.18</span><span>·</span><span>建築</span><span>·</span><span>虎ノ門</span></div>
  <div class="title">建築としての地下空間</div>
  <div class="excerpt">虎ノ門ヒルズの新しい層が、地表と地下のあいだに静かに開かれている。</div>
</article>
</body></html>
