<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:24px 36px;box-sizing:border-box;display:flex;align-items:center;gap:18px}
  .pill{border-radius:999px;border:1px solid var(--color-border);background:transparent;color:var(--fg-2);font-family:"Cormorant Garamond",serif;letter-spacing:0.2em;text-transform:uppercase;font-size:12px;padding:11px 22px;cursor:pointer;text-decoration:none}
  .pill:hover{border-color:#6b1f24;color:#6b1f24}
  .engi{border-radius:999px;background:#6b1f24;color:#f5eee6;font-family:"Cormorant Garamond",serif;letter-spacing:0.2em;text-transform:uppercase;font-size:12px;padding:13px 26px;border:0;cursor:pointer;text-decoration:none}
  .engi:hover{background:#7d2a30}
  .ghost{font-family:var(--font-sans);font-size:12px;letter-spacing:0.04em;color:var(--fg-1);background:none;border:0;text-decoration:underline;text-decoration-color:var(--color-border);text-underline-offset:4px;cursor:pointer}
  .ghost:hover{text-decoration-color:#6b1f24}
  .group{display:flex;flex-direction:column;gap:10px}
  .label{font-family:var(--font-sans);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-3)}
</style></head><body>
<div class="group"><div class="label">primary · engi</div><a class="engi" href="#">CONTACT  →</a></div>
<div class="group"><div class="label">secondary · paper</div><a class="pill" href="#">VIEW ALL  →</a></div>
<div class="group"><div class="label">tertiary · text link</div><a class="ghost" href="#">続きを読む →</a></div>
</body></html>
