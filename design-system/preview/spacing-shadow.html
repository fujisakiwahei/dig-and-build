<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:0;display:flex;align-items:center;justify-content:center}
  .wrap{width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr}
  .pane{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
  .left{background:#f5eee6;background-image:radial-gradient(rgba(0,0,0,0.035) 0.6px,transparent 0.6px);background-size:4px 4px}
  .card{width:200px;height:120px;background:#f0e7dc;border:1px solid #e2d9cf;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);color:#3a3937;font-size:14px;letter-spacing:0.04em}
  .right{background:#6b1f24;position:relative}
  .right::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(245,238,230,0.04) 0.6px,transparent 0.6px);background-size:4px 4px;pointer-events:none}
  .lift{position:relative;z-index:1;width:200px;height:120px;background:#7d2a30;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);color:#f5eee6;font-size:14px;letter-spacing:0.04em;box-shadow:0 1px 0 rgba(245,238,230,0.10) inset, 0 24px 48px -24px rgba(31,15,15,0.55)}
  .label{font-family:var(--font-sans);font-size:10px;letter-spacing:0.16em;text-transform:uppercase}
  .left .label{color:#7a736b}
  .right .label{color:rgba(245,238,230,0.62);position:relative;z-index:1}
</style></head><body>
<div class="wrap">
  <div class="pane left">
    <div class="card">paper card</div>
    <div class="label">flat — no shadow</div>
  </div>
  <div class="pane right">
    <div class="lift">engi lift</div>
    <div class="label">shadow-engi-lift</div>
  </div>
</div>
</body></html>
