<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:24px 36px;box-sizing:border-box;display:flex;align-items:center}
  .row{display:flex;align-items:flex-end;gap:18px;width:100%}
  .step{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:#3a3937;width:24px}
  .label{font-family:var(--font-sans);font-size:10px;letter-spacing:0.06em;color:var(--fg-3)}
  .num{font-family:var(--font-sans);font-size:11px;color:var(--fg-2)}
</style></head><body>
<div class="row">
  <div class="step"><div class="box" style="height:4px"></div><div class="num">4</div><div class="label">space-1</div></div>
  <div class="step"><div class="box" style="height:8px"></div><div class="num">8</div><div class="label">space-2</div></div>
  <div class="step"><div class="box" style="height:12px"></div><div class="num">12</div><div class="label">space-3</div></div>
  <div class="step"><div class="box" style="height:16px"></div><div class="num">16</div><div class="label">space-4</div></div>
  <div class="step"><div class="box" style="height:24px"></div><div class="num">24</div><div class="label">space-5</div></div>
  <div class="step"><div class="box" style="height:32px"></div><div class="num">32</div><div class="label">space-6</div></div>
  <div class="step"><div class="box" style="height:48px"></div><div class="num">48</div><div class="label">space-7</div></div>
  <div class="step"><div class="box" style="height:64px"></div><div class="num">64</div><div class="label">space-8</div></div>
  <div class="step"><div class="box" style="height:96px"></div><div class="num">96</div><div class="label">space-9</div></div>
</div>
</body></html>
