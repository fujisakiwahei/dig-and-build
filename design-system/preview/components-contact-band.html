<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:0}
  .band{height:100%;background:#6b1f24;position:relative;display:flex;align-items:center;padding:0 48px;overflow:hidden}
  .band::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(245,238,230,0.04) 0.6px,transparent 0.6px);background-size:4px 4px;pointer-events:none}
  .row{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;width:100%;gap:32px}
  .left{color:#f5eee6}
  .eyebrow{font-family:"Cormorant Garamond",serif;letter-spacing:0.2em;text-transform:uppercase;font-size:11px;color:rgba(245,238,230,0.62)}
  h2{font-family:var(--font-serif);font-weight:500;font-size:24px;letter-spacing:0.05em;color:#f5eee6;margin:8px 0 6px;line-height:1.3}
  p{font-family:var(--font-serif);font-size:13px;line-height:1.7;color:rgba(245,238,230,0.72);margin:0;max-width:380px}
  .pill{display:inline-flex;align-items:center;gap:14px;border-radius:999px;background:#f5eee6;color:#6b1f24;font-family:"Cormorant Garamond",serif;letter-spacing:0.22em;text-transform:uppercase;font-size:12px;padding:16px 28px;text-decoration:none;box-shadow:0 24px 48px -24px rgba(31,15,15,0.55)}
</style></head><body>
<section class="band">
  <div class="row">
    <div class="left">
      <div class="eyebrow">Inquiry</div>
      <h2>取材・広告のご依頼</h2>
      <p>都市と建築をめぐる取材依頼、特集タイアップのご相談はこちらから承ります。</p>
    </div>
    <a class="pill" href="#">CONTACT  →</a>
  </div>
</section>
</body></html>
