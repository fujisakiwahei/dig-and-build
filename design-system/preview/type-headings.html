<!doctype html>
<html lang="ja"><head><meta charset="utf-8"/>
<title>Type — display & headings</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .specimen {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 4px 0;
    border-top: 1px solid var(--color-border);
  }
  .specimen:first-of-type { border-top: 0; }
  .meta {
    font-family: var(--font-sans);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-3);
    padding-top: 14px;
  }
  .display {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 44px;
    letter-spacing: 0.08em;
    color: var(--fg-2);
    line-height: 1.1;
    padding-bottom: 14px;
  }
  .h1 {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 30px;
    color: var(--fg-2);
    line-height: 1.25;
    letter-spacing: 0.04em;
    padding-bottom: 14px;
  }
  .h2 {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 22px;
    color: var(--fg-2);
    line-height: 1.3;
    letter-spacing: 0.04em;
    padding-bottom: 14px;
  }
  .h3 {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 17px;
    color: var(--fg-2);
    line-height: 1.4;
    letter-spacing: 0.04em;
    padding-bottom: 14px;
  }
</style></head>
<body>
  <div class="card">
    <div class="label">Type · headings</div>
    <div class="specimen">
      <div class="meta">display · Cormorant Garamond · 44 / 1.1 · +0.08em</div>
      <div class="display">DIG &amp; BUILD</div>
    </div>
    <div class="specimen">
      <div class="meta">h1 · Noto Serif JP · 30 / 1.25 · +0.04em</div>
      <div class="h1">日本橋の川を取り戻す</div>
    </div>
    <div class="specimen">
      <div class="meta">h2 · Noto Serif JP · 22 / 1.3</div>
      <div class="h2">再開発と歴史の交点</div>
    </div>
    <div class="specimen">
      <div class="meta">h3 · Noto Serif JP · 17 / 1.4</div>
      <div class="h3">著者について</div>
    </div>
  </div>
</body></html>
