<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:0}
  .wrap{height:100%;display:grid;grid-template-columns:1.1fr 1fr}
  .left{padding:28px 32px;display:flex;flex-direction:column;justify-content:center;gap:14px}
  .swatches{display:flex;gap:18px}
  .sw{width:56px;height:56px}
  .label{font-family:var(--font-sans);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-3)}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--fg-3);letter-spacing:0.04em}
  .right{background:#6b1f24;color:#f5eee6;padding:28px 32px;display:flex;flex-direction:column;justify-content:center;gap:14px;position:relative}
  .right::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(245,238,230,0.04) 0.6px,transparent 0.6px);background-size:4px 4px;pointer-events:none}
  .pill{align-self:flex-start;border-radius:999px;border:1px solid rgba(245,238,230,0.5);color:#f5eee6;font-family:"Cormorant Garamond",serif;letter-spacing:0.18em;text-transform:uppercase;font-size:12px;padding:10px 22px;background:transparent;position:relative;z-index:1}
  .right h3{color:#f5eee6;font-family:var(--font-serif);font-weight:500;font-size:18px;letter-spacing:0.04em;line-height:1.4;margin:0;position:relative;z-index:1}
  .right p{font-family:var(--font-serif);font-size:13px;line-height:1.7;color:rgba(245,238,230,0.62);margin:0;position:relative;z-index:1}
</style></head><body>
<div class="wrap">
  <div class="left">
    <div class="swatches">
      <div>
        <div class="sw" style="background:#6b1f24"></div>
        <div class="label" style="margin-top:8px">engi</div>
        <div class="meta">#6b1f24</div>
      </div>
      <div>
        <div class="sw" style="background:#7d2a30"></div>
        <div class="label" style="margin-top:8px">soft</div>
        <div class="meta">#7d2a30</div>
      </div>
      <div>
        <div class="sw" style="background:#4f161a"></div>
        <div class="label" style="margin-top:8px">deep</div>
        <div class="meta">#4f161a</div>
      </div>
    </div>
    <div class="meta" style="line-height:1.7;max-width:280px">エンジ色 — reserved for footer &amp; contact bands. Library-bound deep crimson-brown.</div>
  </div>
  <div class="right">
    <h3>お問い合わせ</h3>
    <p>取材のご依頼・広告掲載のご相談は、こちらから。</p>
    <a class="pill" href="#">CONTACT  →</a>
  </div>
</div>
</body></html>
