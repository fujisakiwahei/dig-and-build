<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:0}
  .footer{height:100%;background:#6b1f24;position:relative;padding:24px 32px;box-sizing:border-box;color:#f5eee6}
  .footer::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(245,238,230,0.04) 0.6px,transparent 0.6px);background-size:4px 4px;pointer-events:none}
  .grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr 200px;gap:32px;height:100%;box-sizing:border-box}
  .rows{display:flex;flex-direction:column;justify-content:center}
  .row{display:grid;grid-template-columns:140px 1fr;align-items:center;border-top:1px solid rgba(245,238,230,0.18);padding:10px 0;gap:16px;font-family:var(--font-serif);font-size:12.5px;color:#f5eee6;letter-spacing:0.06em}
  .row:first-child{border-top:0}
  .row .head{font-size:13px;font-weight:500;letter-spacing:0.08em;display:inline-flex;align-items:center;gap:10px}
  .row .head .arr{opacity:0.6}
  .items{display:flex;flex-wrap:wrap;gap:4px 18px;font-size:12px}
  .num{font-family:"Cormorant Garamond",serif;font-size:9.5px;color:rgba(245,238,230,0.62);margin-right:4px;letter-spacing:0.1em}
  .copy{margin-top:10px;font-family:"Cormorant Garamond",serif;font-size:10px;letter-spacing:0.18em;color:rgba(245,238,230,0.62);border-top:1px solid rgba(245,238,230,0.18);padding-top:10px}
  .panel{border:1px solid rgba(245,238,230,0.18);padding:18px 14px;display:flex;flex-direction:column;justify-content:space-between;align-items:stretch}
  .vert{font-family:var(--font-serif);writing-mode:vertical-rl;font-size:22px;letter-spacing:0.3em;line-height:1;align-self:flex-end;font-weight:500}
  .desc{font-family:var(--font-serif);font-size:10px;line-height:1.7;color:rgba(245,238,230,0.62);margin:0 0 12px;letter-spacing:0.04em}
  .circle{width:54px;height:54px;border-radius:50%;border:1px solid rgba(245,238,230,0.62);display:flex;align-items:center;justify-content:center;color:#f5eee6}
</style></head><body>
<footer class="footer">
  <div class="grid">
    <div class="rows">
      <div class="row"><span class="head">カテゴリー</span><span></span></div>
      <div class="row"><span class="head">エリア</span><span></span></div>
      <div class="row"><span class="head">広告掲載・タイアップ</span><span></span></div>
      <div class="row"><span class="head">プライバシーポリシー</span><span></span></div>
      <div class="copy">© 2026 DIG &amp; BUILD</div>
    </div>
    <a class="panel">
      <div class="vert">お問い合わせ</div>
      <div>
        <p class="desc">取材のご依頼、広告掲載などはこちら。</p>
        <div class="circle">
          <svg width="28" height="10" viewBox="0 0 36 14" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square">
            <line x1="0" y1="7" x2="34" y2="7" />
            <polyline points="28,1 34,7 28,13" />
          </svg>
        </div>
      </div>
    </a>
  </div>
</footer>
</body></html>
