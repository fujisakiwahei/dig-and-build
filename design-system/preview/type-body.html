<!doctype html>
<html lang="ja"><head><meta charset="utf-8"/>
<title>Type — body & UI</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .body {
    font-family: var(--font-serif);
    color: var(--color-text);
    font-size: 16px;
    line-height: 1.9;
    letter-spacing: 0.03em;
    max-width: 60ch;
  }
  .meta {
    font-family: var(--font-sans);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-3);
  }
  .ui-row {
    display: flex; gap: 24px; flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid var(--color-border);
    margin-top: 4px;
  }
  .ui-spec {
    display: flex; flex-direction: column; gap: 4px;
  }
  .eyebrow {
    font-family: var(--font-sans);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-3);
  }
  .datestamp {
    font-family: var(--font-sans);
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--fg-3);
    font-variant-numeric: tabular-nums;
  }
  .small {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--fg-1);
  }
  .ui-label {
    font-family: var(--font-sans);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-3);
  }
</style></head>
<body>
  <div class="card">
    <div class="meta">body · Noto Serif JP · 16 / 1.9 · +0.03em</div>
    <p class="body">
      日本橋の再開発は、川の景観を取り戻す試みでもある。
      高速道路の地下化に伴い、長く失われていた水辺がふたたび姿を現すまでには、
      なお十年を要するという。
    </p>
    <div class="ui-row">
      <div class="ui-spec">
        <div class="ui-label">eyebrow</div>
        <div class="eyebrow">FEATURED</div>
      </div>
      <div class="ui-spec">
        <div class="ui-label">datestamp</div>
        <div class="datestamp">2026.04.29</div>
      </div>
      <div class="ui-spec">
        <div class="ui-label">small / sans</div>
        <div class="small">お問い合わせ</div>
      </div>
    </div>
  </div>
</body></html>
