<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; display: flex; align-items: center; padding: 28px 36px; box-sizing: border-box; }
  .card { width: 100%; }
  .row { display: flex; align-items: baseline; gap: 24px; flex-wrap: wrap; }
  .label { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); }
  .swatch { width: 56px; height: 56px; border: 1px solid var(--color-border); }
  .swatch.eng { border-color: rgba(245,238,230,0.18); }
  .meta { font-family: var(--font-sans); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
</style>
<title>Card</title></head><body>
<div class="card">
<!-- ROW: 4 paper swatches with names + hex -->
<div class="row" style="gap:32px">
  <div>
    <div class="swatch" style="background:#f5eee6"></div>
    <div class="label" style="margin-top:10px">bg</div>
    <div class="meta">#f5eee6</div>
  </div>
  <div>
    <div class="swatch" style="background:#f0e7dc"></div>
    <div class="label" style="margin-top:10px">bg-soft</div>
    <div class="meta">#f0e7dc</div>
  </div>
  <div>
    <div class="swatch" style="background:#e9dccc"></div>
    <div class="label" style="margin-top:10px">bg-deep</div>
    <div class="meta">#e9dccc</div>
  </div>
  <div>
    <div class="swatch" style="background:#e2d9cf"></div>
    <div class="label" style="margin-top:10px">border</div>
    <div class="meta">#e2d9cf</div>
  </div>
  <div style="flex:1; min-width:160px; align-self:center">
    <div style="font-family:var(--font-serif); font-size:15px; color:var(--fg-2); line-height:1.7">
      赤みのある紙のトーン。<br><span class="meta">Warm reddish paper register — never pure white.</span>
    </div>
  </div>
</div>
</div>
</body></html>
