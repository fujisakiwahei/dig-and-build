<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{height:100%}
  body{margin:0;padding:24px 36px;box-sizing:border-box;display:flex;align-items:center}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:32px;width:100%}
  .col h4{font-family:var(--font-sans);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 10px}
  .col p{font-family:var(--font-serif);color:var(--fg-1);font-size:13.5px;line-height:1.9;letter-spacing:0.03em;margin:0}
  .tight p{line-height:1.5;letter-spacing:0}
</style></head><body>
<div class="wrap">
  <div class="col">
    <h4>本文 — line 1.9 / tracking 0.03em</h4>
    <p>都市の表情は、再開発のたびに少しずつ書き換えられていく。橋の欄干、地下の通路、午後の影。読む側は、それらの細部を順に拾い直す。</p>
  </div>
  <div class="col tight">
    <h4>tight — comparison (not used)</h4>
    <p>都市の表情は、再開発のたびに少しずつ書き換えられていく。橋の欄干、地下の通路、午後の影。読む側は、それらの細部を順に拾い直す。</p>
  </div>
</div>
</body></html>
